name: build-windows
on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install OpenBLAS via vcpkg
        shell: pwsh
        run: |
          vcpkg install openblas:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure CMake (auto-detect Visual Studio + ClangCL)
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. ^
            -T "ClangCL" ^
            -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows ^
            -DBLA_VENDOR=OpenBLAS ^
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"

      - name: Build
        shell: cmd
        working-directory: build
        run: cmake --build . --config Release -j 4

      - name: List Binaries
        shell: pwsh
        working-directory: build
        run: |
          Write-Host "=== Suche nach allen .exe und .dll ==="
          Get-ChildItem -Recurse -Include "*.exe","*.dll" | Format-Table FullName, Length

      - name: Copy required DLLs to build dir
        shell: pwsh
        working-directory: build
        run: |
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            Write-Host "Kopiere DLLs aus $vcpkgBin"
            Get-ChildItem -Path $vcpkgBin -Filter "*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination .
              Write-Host "  kopiert: $($_.Name)"
            }
          }

      - name: Upload Binary
        uses: actions/upload-artifact@v6
        with:
          name: demucs-cpp-win-x64
          path: |
            build/**/*.exe
            build/**/*.dll
