name: build-windows
on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install LLVM/Clang (handles -Wextra)
        shell: pwsh
        run: |
          choco install llvm -y --no-progress
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Configure CMake (Ninja + Clang)
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake .. -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=clang ^
            -DCMAKE_CXX_COMPILER=clang++ ^
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"

      - name: Build
        shell: cmd
        working-directory: build
        run: cmake --build . --config Release -j 4

      - name: List Binaries
        shell: pwsh
        working-directory: build
        run: |
          Write-Host "=== Suche nach allen .exe und .dll ==="
          Get-ChildItem -Recurse -Include "*.exe","*.dll" | Format-Table FullName, Length

      - name: Upload Binary
        uses: actions/upload-artifact@v6
        with:
          name: demucs-cpp-win-x64
          path: |
            build/**/*.exe
            build/**/*.dll
